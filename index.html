<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="theme-color" content="#0066ff" />
<title>PBC Tandem · Conversation topics</title>
<link rel="icon" type="image/png" href="logo1.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f6f9;
    --card:#ffffff;
    --ink:#1c2430;
    --muted:#667085;
    --line:#e6e9f0;
    --blue:#0066ff;
    --blue-dark:#0052cc;
    --blue-soft:#e7f0ff;
    --yellow:#e8de21;
    --yellow-soft:#fbf7c9;
    --cyan:#02a9ca;
    --cyan-soft:#dff5fa;
    --radius:18px;
    --shadow:0 10px 30px rgba(0,40,90,.10);
    --shadow-sm:0 2px 10px rgba(0,40,90,.07);
    --font:"Poppins",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--ink);
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 48px;min-height:100dvh}

  /* Header: PBC blue bar */
  header{
    position:sticky;top:0;z-index:10;
    background:var(--blue);
    margin:0 -16px 16px;
    padding:12px 16px;
    box-shadow:0 4px 16px rgba(0,60,150,.20);
  }
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{height:40px;width:auto;display:block;flex:none}
  .tagline{
    color:rgba(255,255,255,.92);font-size:12px;font-weight:600;line-height:1.15;
    border-left:1px solid rgba(255,255,255,.4);padding-left:10px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis
  }
  @media(max-width:379px){.tagline{display:none}}

  /* Language toggle */
  .lang{display:inline-flex;background:rgba(255,255,255,.16);border-radius:999px;padding:3px;flex:none}
  .lang button{
    border:0;background:transparent;font:inherit;font-weight:700;font-size:13px;
    padding:7px 11px;border-radius:999px;color:#fff;opacity:.85;cursor:pointer;display:flex;align-items:center;gap:5px
  }
  .lang button.on{background:var(--yellow);color:#222;opacity:1}

  /* Screen transitions */
  .screen{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h1.title{font-size:23px;margin:8px 2px 2px;letter-spacing:-.3px;font-weight:700}
  p.sub{color:var(--muted);margin:0 2px 18px;font-size:14.5px}

  /* Cards */
  .grid{display:grid;gap:12px}
  .grid.topics{grid-template-columns:1fr 1fr}
  .card{
    appearance:none;width:100%;text-align:left;font:inherit;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-sm);transition:transform .08s ease,box-shadow .15s ease,border-color .15s ease;
  }
  .card:active{transform:scale(.985)}
  .card:hover{box-shadow:var(--shadow);border-color:#cfd9ea}

  /* Level cards */
  .level{display:flex;align-items:center;gap:14px;padding:16px 16px}
  .level .emoji{font-size:25px;width:48px;height:48px;border-radius:14px;display:grid;place-items:center;flex:none}
  .level.b .emoji{background:var(--cyan-soft)}
  .level.i .emoji{background:var(--blue-soft)}
  .level.a .emoji{background:var(--yellow-soft)}
  .level .txt b{font-size:17px;display:block;font-weight:700}
  .level .txt span{font-size:13px;color:var(--muted);font-weight:500}
  .level .arrow{margin-left:auto;color:var(--blue);font-size:22px;flex:none;font-weight:700}

  /* Topic cards */
  .topic{padding:18px 12px;display:flex;flex-direction:column;align-items:flex-start;gap:9px;min-height:108px;justify-content:center}
  .topic .emoji{font-size:30px}
  .topic b{font-size:15px;line-height:1.2;font-weight:600}

  /* Questions */
  .qhead{
    background:linear-gradient(120deg,var(--blue),var(--cyan));color:#fff;
    border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px
  }
  .qhead .row{display:flex;align-items:center;gap:10px}
  .qhead .ico{font-size:26px}
  .qhead h2{margin:0;font-size:20px;letter-spacing:-.2px;font-weight:700}
  .chip{display:inline-block;font-size:11.5px;font-weight:800;background:var(--yellow);color:#222;padding:4px 11px;border-radius:999px;margin-top:9px;text-transform:uppercase;letter-spacing:.5px}
  .qhint{font-size:13px;color:var(--muted);margin:0 2px 12px;display:flex;gap:7px;align-items:flex-start}

  ol.q{list-style:none;counter-reset:q;margin:0;padding:0;display:grid;gap:10px}
  ol.q li{
    counter-increment:q;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px 16px 15px 52px;position:relative;font-size:16px;box-shadow:var(--shadow-sm)
  }
  ol.q li::before{
    content:counter(q);position:absolute;left:12px;top:14px;
    width:28px;height:28px;border-radius:9px;background:var(--blue-soft);color:var(--blue);
    font-size:13px;font-weight:800;display:grid;place-items:center
  }

  /* Buttons / nav */
  .backbtn{
    appearance:none;border:0;background:transparent;font:inherit;font-weight:700;color:var(--blue);
    cursor:pointer;padding:8px 4px;font-size:14.5px;display:inline-flex;align-items:center;gap:6px;margin:2px 0 8px
  }
  .footnav{display:flex;gap:10px;margin-top:20px}
  .footnav button{
    flex:1;appearance:none;font:inherit;font-weight:700;cursor:pointer;border-radius:13px;padding:13px;font-size:14.5px;
    border:1px solid var(--line);background:#fff;color:var(--ink);box-shadow:var(--shadow-sm)
  }
  .footnav button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}

  /* Tips */
  .tips{margin-top:24px;display:grid;gap:9px}
  .tip{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .tip b{color:var(--ink);font-weight:700}

  /* Schedule + timezones */
  .sched{margin-top:22px;background:linear-gradient(135deg,#ffffff,var(--blue-soft));
    border:1px solid #d4e3ff;border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow-sm)}
  .sched .row{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px}
  .sched .ic{font-size:20px;flex:none;line-height:1.2}
  .sched b{font-size:14.5px;font-weight:700;line-height:1.3}
  .sched .zones{display:flex;flex-wrap:wrap;gap:6px}
  .sched .zone{font-size:11.5px;font-weight:600;color:var(--blue);background:#fff;
    border:1px solid #d4e3ff;border-radius:999px;padding:3px 9px;white-space:nowrap}

  /* Action link buttons (meeting room / organize) */
  .linkbtn{display:flex;align-items:center;gap:12px;width:100%;text-decoration:none;margin-top:11px;
    border-radius:15px;padding:14px 16px;transition:transform .08s ease,box-shadow .15s ease;box-shadow:var(--shadow-sm)}
  .linkbtn:active{transform:scale(.99)}
  .linkbtn .bic{font-size:22px;flex:none}
  .linkbtn .btxt{flex:1;min-width:0}
  .linkbtn .btxt b{display:block;font-size:15px;font-weight:700;line-height:1.2}
  .linkbtn .btxt span{display:block;font-size:12px;font-weight:500;opacity:.85;margin-top:2px}
  .linkbtn .arr{font-size:18px;flex:none;opacity:.7}
  .linkbtn.meet{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(0,102,255,.3)}
  .linkbtn.org{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .linkbtn.org .bic{color:var(--blue)}

  /* Free-class CTA: brand pill */
  .cta{display:block;text-decoration:none;color:var(--ink);margin-top:20px;
    background:linear-gradient(135deg,#ffffff,var(--blue-soft));
    border:1px solid #d4e3ff;border-radius:var(--radius);padding:17px 16px 16px;box-shadow:var(--shadow-sm);
    transition:transform .08s ease,box-shadow .15s ease}
  .cta:active{transform:scale(.99)}
  .cta:hover{box-shadow:var(--shadow)}
  .cta .row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .cta .ic{font-size:22px;flex:none}
  .cta b{font-size:15.5px;letter-spacing:-.2px;font-weight:700}
  .cta p{margin:0 0 13px;font-size:13px;color:var(--muted);line-height:1.45}
  .cta .cta-btn{display:block;text-align:center;background:var(--yellow);color:#222;
    font-weight:800;padding:13px;border-radius:100px;font-size:13px;text-transform:uppercase;letter-spacing:.8px;
    box-shadow:0 4px 14px rgba(232,222,33,.5)}

  footer{margin-top:26px;text-align:center;font-size:12px;color:#9aa3b5}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="bar">
      <div class="brand">
        <img class="logo" src="logo.png" alt="PBC Languages" />
        <span id="tagline" class="tagline">Conversation topics</span>
      </div>
      <div class="lang" role="group" aria-label="Language">
        <button id="langEn" onclick="setLang('en')">🇬🇧 EN</button>
        <button id="langEs" onclick="setLang('es')">🇪🇸 ES</button>
      </div>
    </div>
  </header>
  <main id="app"></main>
  <footer>PBC Languages · free language exchange</footer>
</div>

const CTA_URL="https://app.pbclanguages.com/";
const MEET_URL="https://meet.google.com/btn-asdm-pmi";
const ORG_URL="https://app.pbclanguages.com/tandems/";
function ctaHTML(){
  const t=T[state.lang];
  return `<a class="cta" href="${CTA_URL}" target="_blank" rel="noopener">
    <div class="row"><span class="ic">🎓</span><b>${t.ctaTitle}</b></div>
    <p>${t.ctaSub}</p>
    <span class="cta-btn">${t.ctaBtn}</span>
  </a>`;
}
function footerBlock(){
  const t=T[state.lang];
  return `
    <div class="sched">
      <div class="row"><span class="ic">🗓️</span><b>${esc(t.schedTitle)}</b></div>
      <div class="zones">${t.zones.map(z=>`<span class="zone">${esc(z)}</span>`).join("")}</div>
    </div>
    <a class="linkbtn meet" href="${MEET_URL}" target="_blank" rel="noopener">
      <span class="bic">🎥</span><span class="btxt"><b>${esc(t.meetTitle)}</b><span>${esc(t.meetSub)}</span></span><span class="arr">→</span>
    </a>
    <a class="linkbtn org" href="${ORG_URL}" target="_blank" rel="noopener">
      <span class="bic">🤝</span><span class="btxt"><b>${esc(t.orgTitle)}</b><span>${esc(t.orgSub)}</span></span><span class="arr">›</span>
    </a>
    ${ctaHTML()}`;
}

/* ---------------- Content ---------------- */
const LEVELS=[

  {id:"travel",emoji:"✈️",name:{en:"Travel",es:"Viajes"},q:{

/* ---------------- State + render ---------------- */
const state={lang:"en",level:null,topic:null};
const app=document.getElementById("app");
const esc=s=>s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function setLang(l){
  state.lang=l;
  document.documentElement.lang=l;
  document.getElementById("langEn").classList.toggle("on",l==="en");
  document.getElementById("langEs").classList.toggle("on",l==="es");
  document.getElementById("tagline").textContent=T[l].tagline;
  render();
}

function render(){
  if(state.topic) return renderQuestions();
  if(state.level) return renderTopics();
  return renderLevels();
}

function renderLevels(){
  const t=T[state.lang];
  app.innerHTML=`<div class="screen">
    <h1 class="title">${t.chooseLevel}</h1>
    <p class="sub">${t.levelSub}</p>
    <div class="grid">
      ${LEVELS.map(l=>`<button class="card level ${l.cls}" onclick="pickLevel('${l.id}')">
        <span class="emoji">${l.emoji}</span>
        <span class="txt"><b>${t.levels[l.id]}</b><span>${t.levelDesc[l.id]}</span></span>
        <span class="arrow">›</span>
      </button>`).join("")}
    </div>
    <div class="tips">
      ${[t.tip1,t.tip2,t.tip3].map(x=>`<div class="tip"><span>${x[0]}</span><span>${x[1]}</span></div>`).join("")}
    </div>
    ${footerBlock()}
  </div>`;
}

function renderTopics(){
  const t=T[state.lang];
  app.innerHTML=`<div class="screen">
    <button class="backbtn" onclick="goLevels()">‹ ${t.levelBtn}</button>
    <h1 class="title">${t.chooseTopic}</h1>
    <p class="sub">${t.topicSub} · <b>${t.levels[state.level]}</b></p>
    <div class="grid topics">
      ${TOPICS.map(tp=>`<button class="card topic" onclick="pickTopic('${tp.id}')">
        <span class="emoji">${tp.emoji}</span><b>${esc(tp.name[state.lang])}</b>
      </button>`).join("")}
    </div>
  </div>`;
}

function renderQuestions(){
  const t=T[state.lang];
  const tp=TOPICS.find(x=>x.id===state.topic);
  const qs=tp.q[state.level][state.lang];
  app.innerHTML=`<div class="screen">
    <button class="backbtn" onclick="goTopics()">‹ ${t.topicsBtn}</button>
    <div class="qhead">
      <div class="row"><span class="ico">${tp.emoji}</span><h2>${esc(tp.name[state.lang])}</h2></div>
      <span class="chip">${t.levels[state.level]}</span>
    </div>
    <p class="qhint"><span>${t.qhint}</span></p>
    <ol class="q">${qs.map(q=>`<li>${esc(q)}</li>`).join("")}</ol>
    <div class="footnav">
      <button onclick="goTopics()">↩︎ ${t.topicsBtn}</button>
      <button class="primary" onclick="goLevels()">${t.levelBtn}</button>
    </div>
    ${footerBlock()}
  </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

function pickLevel(id){state.level=id;render()}
function pickTopic(id){state.topic=id;render()}
function goLevels(){state.level=null;state.topic=null;render()}
function goTopics(){state.topic=null;render()}

/* init: detect browser language */
setLang((navigator.language||"en").toLowerCase().startsWith("es")?"es":"en");
</script>
